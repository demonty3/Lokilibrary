name = "libraryworld"
main = "index.ts"
compatibility_date = "2026-05-01"

# Local dev: `npm run worker` starts wrangler on :8787.
# Secrets and provider config live in worker/.dev.vars (gitignored).
#
# Required for production:
#   ANTHROPIC_API_KEY = "sk-ant-..."
#   LLM_PROVIDER       = "anthropic"   # or "local" for Ollama (dev only)
#
# Optional local-dev:
#   OLLAMA_URL   = "http://localhost:11434"
#   OLLAMA_MODEL = "qwen3:14b"

[dev]
port = 8787

# KV-backed read-through cache for Steam Web API responses (Phase 2 slice 2+)
# and the Stage 1 manifest. Lands here at v0.2.
#
# Local dev: `wrangler dev` uses a local sqlite simulation regardless of `id`,
# so the placeholder below is fine for `npm run worker`. No setup required.
#
# Production: create a real namespace once via
#   wrangler kv namespace create CACHE --config worker/wrangler.toml
# then paste the returned id below. Until that's done, deploys will use the
# placeholder and KV calls will fail at runtime (the worker degrades to
# uncached fetches — see worker/lib/cache.ts).
[[kv_namespaces]]
binding = "CACHE"
id = "local_dev_placeholder"
