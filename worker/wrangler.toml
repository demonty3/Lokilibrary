name = "libraryworld"
main = "index.ts"
compatibility_date = "2026-05-01"

# Local dev: `npm run worker` starts wrangler on :8787.
# Secrets and provider config live in worker/.dev.vars (gitignored).
#
# Required for production:
#   ANTHROPIC_API_KEY = "sk-ant-..."
#   LLM_PROVIDER       = "anthropic"   # or "local" for Ollama (dev only)
#
# Optional local-dev:
#   OLLAMA_URL   = "http://localhost:11434"
#   OLLAMA_MODEL = "qwen3:14b"

[dev]
port = 8787

# KV-backed cache + share-URL storage. Two consumers:
#   - Steam / HLTB / IGDB / manifest read-through cache (Phase 2 slice 2+).
#     Worker degrades gracefully when CACHE is unbound — kvGet falls through
#     to an uncached fetch. Costs one extra Steam call per /api/library hit.
#   - Share-URL records (Phase 5 slice 3). Hard requirement — without the
#     binding, POST /api/share returns 503. There's no in-memory fallback
#     because share records must survive worker restarts to keep URLs alive.
#
# To enable both:
#   1. Once: wrangler kv namespace create CACHE --config worker/wrangler.toml
#   2. Paste the returned id into the block below (uncomment all 3 lines).
#   3. npm run worker  (locally) and/or push (Cloudflare Workers Builds will
#      deploy with the real id present).
#
# Local `wrangler dev` simulates KV via sqlite regardless of the `id` value,
# so a placeholder id works locally. But Cloudflare Workers Builds rejects
# placeholder ids at deploy time — the id MUST be real before pushing.
#
# [[kv_namespaces]]
# binding = "CACHE"
# id = "REPLACE_WITH_REAL_KV_NAMESPACE_ID"
